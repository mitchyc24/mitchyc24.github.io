<div class="blog-container">
  <h2 class="en">Blog</h2>
  <h2 class="fr">Blogue</h2>
  <div id="blog-posts-container">
    <!-- Blog posts will be loaded here by JavaScript -->
  </div>
</div>

<script>
  // Function to fetch and display blog posts
  async function fetchBlogPosts() {
    const blogPostsContainer = document.getElementById('blog-posts-container');
    if (!blogPostsContainer) return;

    try {
      const response = await fetch(`static/blog/blog_posts.json`);
      if (!response.ok) {
        throw new Error(`Failed to fetch blog posts: ${response.statusText}`);
      }
      const posts = await response.json();
      let allPostsHTML = '';

      // Sort posts by date, newest first
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      for (const post of posts) {
        const imageHTML = post.image ? `<img src="${post.image}" alt="${post.title}" class="blog-post-image">` : '';
        const postHTML = `
          <article class="blog-post">
            <h3>${post.title}</h3>
            <p class="blog-post-date">${new Date(post.date).toLocaleDateString()}</p>
            <div class="blog-post-content">
              ${imageHTML}
              <p>${post.content}</p>
            </div>
          </article>
        `;
        allPostsHTML += postHTML;
      }
      blogPostsContainer.innerHTML = allPostsHTML || '<p>No blog posts found.</p>';
    } catch (error) {
      console.error('Error fetching blog posts:', error);
      blogPostsContainer.innerHTML = '<p>Error loading blog posts.</p>';
    }
  }

  // Fetch posts immediately when this partial is loaded
  fetchBlogPosts();
</script>
