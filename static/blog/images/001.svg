<!-- CPU ↔ circuit ↔ logic‑gate illustration                          -->
<!-- Feel free to tweak coordinates, colours or sizes to taste.       -->
<!-- Save as *.svg and open in any modern browser or vector package.  -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="800" viewBox="0 0 800 800"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ========== Definitions ========== -->
  <!-- arrow‑head marker for data flow arrows -->
  <defs>
    <marker id="arrowHead" markerWidth="6" markerHeight="6"
            refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="currentColor"/>
    </marker>

    <!-- dashed projection lines style -->
    <style>
      .proj {stroke:#666; stroke-dasharray:4 4; stroke-width:1;}
      .gateOutline {fill:none; stroke:#000; stroke-width:2;}
      .blue {stroke:#0b4dff; color:#0b4dff;}
      .red  {stroke:#d00000; color:#d00000;}
    </style>
  </defs>

  <!-- ========== CPU package (simple 3‑D slab) ========== -->
  <polygon points="330,600 520,600 560,660 370,660" fill="#cfcfcf" stroke="#000" stroke-width="1.5"/>
  <!-- pins -->
  <g stroke="#000" stroke-width="2">
    <line x1="340" y1="660" x2="340" y2="680"/>
    <line x1="360" y1="660" x2="360" y2="680"/>
    <line x1="380" y1="660" x2="380" y2="680"/>
    <line x1="400" y1="660" x2="400" y2="680"/>
    <line x1="420" y1="660" x2="420" y2="680"/>
    <line x1="440" y1="660" x2="440" y2="680"/>
    <line x1="460" y1="660" x2="460" y2="680"/>
    <line x1="480" y1="660" x2="480" y2="680"/>
    <line x1="500" y1="660" x2="500" y2="680"/>
    <line x1="520" y1="660" x2="520" y2="680"/>
  </g>
  <text x="430" y="645" font-size="28" fill="#0044ff" text-anchor="middle">CPU</text>

  <!-- ========== Circuit board (flat rectangle) ========== -->
  <rect x="270" y="400" width="260" height="120" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="540" y="455" font-size="24" fill="#0044ff">Circuit</text>

  <!-- coloured gate blocks on board -->
  <rect x="305" y="415" width="65" height="30" fill="#7be0bb" stroke="#000"/>
  <text x="338" y="436" font-size="20" font-weight="bold" text-anchor="middle">AND</text>

  <rect x="305" y="460" width="65" height="30" fill="#f9f08b" stroke="#000"/>
  <text x="338" y="481" font-size="20" font-weight="bold" text-anchor="middle">NOT</text>

  <rect x="390" y="487" width="65" height="30" fill="#7be0bb" stroke="#000"/>
  <text x="423" y="508" font-size="20" font-weight="bold" text-anchor="middle">AND</text>

  <rect x="455" y="430" width="65" height="30" fill="#70e6f6" stroke="#000"/>
  <text x="488" y="451" font-size="20" font-weight="bold" text-anchor="middle">OR</text>

  <!-- ========== Floating gate sketches ========== -->
  <!-- AND gate (top‑left) -->
  <g transform="translate(180,120)">
    <rect width="140" height="55" class="gateOutline"/>
    <!-- two input data lines -->
    <line x1="0" y1="15" x2="20" y2="15" class="red" stroke-width="3" marker-end="url(#arrowHead)"/>
    <line x1="0" y1="40" x2="20" y2="40" class="blue" stroke-width="3" marker-end="url(#arrowHead)"/>
    <!-- internal diagonal lines -->
    <line x1="50" y1="15" x2="120" y2="40" stroke="#000" stroke-width="2"/>
    <line x1="50" y1="40" x2="120" y2="15" stroke="#000" stroke-width="2"/>
    <!-- output -->
    <line x1="140" y1="27.5" x2="160" y2="27.5" class="blue" stroke-width="3" marker-end="url(#arrowHead)"/>
    <text x="70" y="-10" font-size="18" font-weight="bold">AND</text>
  </g>

  <!-- NOT gate (mid‑left) -->
  <g transform="translate(90,275)">
    <rect width="110" height="40" class="gateOutline"/>
    <!-- input -->
    <line x1="-20" y1="20" x2="0" y2="20" class="blue" stroke-width="3" marker-end="url(#arrowHead)"/>
    <!-- inverter bubble -->
    <circle cx="90" cy="20" r="6" stroke="#000" fill="none" stroke-width="2"/>
    <!-- output -->
    <line x1="110" y1="20" x2="130" y2="20" class="red" stroke-width="3" marker-end="url(#arrowHead)"/>
    <text x="45" y="-10" font-size="18" font-weight="bold">NOT</text>
  </g>

  <!-- OR gate (top‑right) -->
  <g transform="translate(520,160)">
    <!-- drawn as a rectangle here for simplicity -->
    <rect width="150" height="60" class="gateOutline"/>
    <!-- inputs -->
    <line x1="0" y1="20" x2="20" y2="20" class="red"  stroke-width="3" marker-end="url(#arrowHead)"/>
    <line x1="0" y1="45" x2="20" y2="45" class="blue" stroke-width="3" marker-end="url(#arrowHead)"/>
    <!-- internal cross -->
    <line x1="45" y1="20" x2="105" y2="45" stroke="#000" stroke-width="2"/>
    <line x1="45" y1="45" x2="105" y2="20" stroke="#000" stroke-width="2"/>
    <!-- output -->
    <line x1="150" y1="32.5" x2="170" y2="32.5" class="red" stroke-width="3" marker-end="url(#arrowHead)"/>
    <text x="75" y="-10" font-size="18" font-weight="bold">OR</text>
  </g>

  <!-- ========== Projection (dashed) lines ========== -->
  <!-- From AND sketch -->
  <polyline points="260,175 305,410" class="proj"/>
  <polyline points="260,175 420,502" class="proj"/>
  <!-- From NOT sketch -->
  <polyline points="140,295 305,475" class="proj"/>
  <!-- From OR sketch -->
  <polyline points="595,190 515,445" class="proj"/>

  <!-- From board down to CPU -->
  <polyline points="400,520 430,600" class="proj"/>

  <!-- ========== Legend & titles ========== -->
  <text x="100" y="280" font-size="20" fill="#000">Blue=0</text>
  <text x="100" y="305" font-size="20" fill="#000">Red=1</text>

  <text x="560" y="90" font-size="26" fill="#0044ff" font-weight="bold">Gates</text>
  <text x="560" y="115" font-size="22" fill="#0044ff">(AND,OR,NOT)</text>
</svg>
