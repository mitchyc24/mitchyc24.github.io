<defs><style>

        .frame {
            animation-duration: 1s;
            animation-timing-function: steps(1, end);
            animation-iteration-count: infinite;
            visibility: hidden;
        }
    
        #frame-0 { animation-name: frame-anim-0; }
        @keyframes frame-anim-0 {
            0% { visibility: hidden; }
            0.0% { visibility: visible; }
            50.0% { visibility: hidden; }
            100% { visibility: hidden; }
        }
        
        #frame-1 { animation-name: frame-anim-1; }
        @keyframes frame-anim-1 {
            0% { visibility: hidden; }
            50.0% { visibility: visible; }
            100% { visibility: hidden; }
            100% { visibility: hidden; }
        }
        </style></defs>
<g id="frame-0" class="frame">
