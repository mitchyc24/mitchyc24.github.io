<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitchell Carroll</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.png">
  <link rel="stylesheet" href="static/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" integrity="sha512-TU/clvRaSqKB43MX6dvJPEWV8tEGDTbmT4mdxTs6DSYsBY9zKmiw4Qeykp0nS10ndH14HRNG2VWN+IjiMfA17Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="static/htmx.min.js"></script>
</head>

<body>
  <div class="nav-container">
    <div class="header-content">
      <div class="header-left">
        <h1>Mitchell Carroll</h1>
        <p class="en">Computer Scientist at ♥</p>
        <p class="fr">Informaticien à ♥</p>
        <p class="en">Software Engineer by &#128736</p>
        <p class="fr">Développeur de logiciel &#128736</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="#" class="en" id="nav-home-en" hx-get="static/pages/home.html" hx-target="#content-container">Home</a>
      <a href="#" class="fr" id="nav-home-fr" hx-get="static/pages/home.html" hx-target="#content-container">Accueil</a>
      <a href="#" class="en" id="nav-resume-en" hx-get="static/pages/resume.html" hx-target="#content-container">Resume</a>
      <a href="#" class="fr" id="nav-resume-fr" hx-get="static/pages/resume.html" hx-target="#content-container">CV</a>
      <a href="#" class="en" id="nav-blog-en" hx-get="static/pages/blog.html" hx-target="#content-container">Blog</a>
      <a href="#" class="fr" id="nav-blog-fr" hx-get="static/pages/blog.html" hx-target="#content-container">Blogue</a>
      <a href="#" class="en" id="nav-chess-en" hx-get="static/pages/chess.html" hx-target="#content-container">Chess</a>
      <a href="#" class="fr" id="nav-chess-fr" hx-get="static/pages/chess.html" hx-target="#content-container">Échecs</a>
    </div>
    <div class="nav-buttons">
      <button class="language-toggle" id="languageToggle"><i class="fas fa-language"></i></button>
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <!-- Content Container for Dynamic Content Loading -->
  <div id="content-container">
    <!-- Initial home content -->
    Content will be loaded here dynamically.
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Theme toggle functionality
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = themeToggle.querySelector('i');

      // Check if user has a saved preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      }

      themeToggle.addEventListener('click', function () {
        document.body.classList.toggle('dark-theme');

        // Update icon
        if (document.body.classList.contains('dark-theme')) {
          themeIcon.classList.remove('fa-moon');
          themeIcon.classList.add('fa-sun');
          localStorage.setItem('theme', 'dark');
        } else {
          themeIcon.classList.remove('fa-sun');
          themeIcon.classList.add('fa-moon');
          localStorage.setItem('theme', 'light');
        }
      });

      // Language toggle functionality
      const languageToggle = document.getElementById('languageToggle');

      // Check if user has a saved language preference
      const savedLanguage = localStorage.getItem('language');
      if (savedLanguage === 'fr') {
        document.body.classList.add('french-active');
      }

      languageToggle.addEventListener('click', function () {
        document.body.classList.toggle('french-active');

        // Save preference
        if (document.body.classList.contains('french-active')) {
          localStorage.setItem('language', 'fr');
        } else {
          localStorage.setItem('language', 'en');
        }
      });

      // Add active class handling for navigation
      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', function (e) {
          // Remove active class from all links
          document.querySelectorAll('.nav-links a').forEach(l => {
            l.classList.remove('active');
          });

          // Add active class to clicked link
          this.classList.add('active');

          // If it's the Home link, show the home content
          if (this.textContent.trim() === 'Home') {
            // Load home content
            fetch('/')
              .then(response => response.text())
              .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const homeContent = doc.querySelector('.home-main').outerHTML;
                document.getElementById('content-container').innerHTML = homeContent;
              });
          } else if (this.id === 'nav-blog-en' || this.id === 'nav-blog-fr') {
            // Load blog content structure
            fetch('static/pages/blog.html')
              .then(response => response.text())
              .then(html => {
                document.getElementById('content-container').innerHTML = html;
                // After loading blog.html, fetch and display posts
                fetchBlogPosts();
              });
          }
        });
      });

      // Function to fetch and display blog posts
      async function fetchBlogPosts() {
        const blogPostsContainer = document.getElementById('blog-posts-container');
        if (!blogPostsContainer) return;

        try {
          const response = await fetch(`static/blog/blog_posts.json`);
          if (!response.ok) {
            throw new Error(`Failed to fetch blog posts: ${response.statusText}`);
          }
          const posts = await response.json();
          let allPostsHTML = '';

          for (const post of posts) {
            const postHTML = `
              <article class="blog-post">
                <h3>${post.title}</h3>
                <p class="post-date">${new Date(post.date).toLocaleDateString()}</p>
                <p>${post.content}</p>
              </article>
            `;
            allPostsHTML += postHTML;
          }
          blogPostsContainer.innerHTML = allPostsHTML || '<p>No blog posts found.</p>';
        } catch (error) {
          console.error('Error fetching blog posts:', error);
          blogPostsContainer.innerHTML = '<p>Error loading blog posts.</p>';
        }
      }

      // Initial content load check - if blog is the target, load posts
      // This handles direct navigation or refresh on the blog page
      if (window.location.hash && window.location.hash.includes('blog')) {
         // Simulate a click on the blog tab if htmx hasn't loaded it yet
         // This is a fallback, hx-get should ideally handle this
        const blogNavLink = document.getElementById('nav-blog-en') || document.getElementById('nav-blog-fr');
        if (blogNavLink && !document.getElementById('blog-posts-container')) {
            htmx.process(blogNavLink); // Trigger htmx loading
            // htmx.onLoad isn't standard, using a small delay to ensure container exists
            setTimeout(fetchBlogPosts, 500);
        } else if (document.getElementById('blog-posts-container')) {
            fetchBlogPosts();
        }
      }
    });
  </script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" integrity="sha512-xRllwz2gdZciIB+AkEbeq+gVhX8VB8XsfqeFbUh+SzHlN96dEduwtTuVuc2u9EROlmW9+yhRlxjif66ORpsgVA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" integrity="sha512-WfASs5HtTgTL/eZsLaOftSN9wMQl7WZGlU5UiKx/yxTViMfGh9whWRwKAC27qH8VtZJqSMqDdbq2uUb1tY3jvQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
