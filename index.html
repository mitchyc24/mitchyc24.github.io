<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Master</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <!-- CDN Links for libraries -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Task Master</h1>
    <div class="controls">
      <button id="add-column-btn">Add Column</button>
      <button id="show-analytics-btn">Analytics</button>
      <button id="backup-btn">Backup DB</button>
      <button id="restore-btn">Restore DB</button>
      <input type="file" id="restore-input" style="display: none;" accept="application/json">
    </div>
  </header>

  <main id="board" class="board">
    <!-- Columns will be injected here via JS -->
  </main>

  <!-- 3D Expanded Card Modal -->
  <div id="card-modal-overlay" class="modal-overlay hidden">
    <div class="modal-content 3d-card-container">
      <div id="expanded-card" class="expanded-card">
        <!-- Expanded card content will be injected here -->
      </div>
    </div>
  </div>

  <!-- Analytics Modal -->
  <div id="analytics-modal" class="modal-overlay hidden">
    <div class="modal-content analytics-content">
      <h2>Cumulative Flow Diagram</h2>
      <canvas id="cfd-chart"></canvas>
      <button id="close-analytics-btn">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
