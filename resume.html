<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitchell Carroll - Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #e9ecef;
      --bg-accent: #dee2e6;
      --text-primary: #212529;
      --text-secondary: #495057;
      --accent-blue: #0d6efd;
      --accent-dark: #343a40;
      --accent-light: #6c757d;
      --accent-purple: #6f42c1;
      --accent-teal: #20c997;
      --card-shadow: rgba(0, 0, 0, 0.1);
    }

    /* Dark theme variables */
    .dark-theme {
      --bg-primary: #212529;
      --bg-secondary: #343a40;
      --bg-accent: #495057;
      --text-primary: #f8f9fa;
      --text-secondary: #e9ecef;
      --card-shadow: rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      position: relative;
    }

    /* Navigation and Header */
    nav {
      background-color: var(--bg-secondary);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 4px var(--card-shadow);
      border-bottom: 2px solid var(--accent-blue);
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .header-content {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .header-left h1 {
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .header-left p {
      font-size: 1.1rem;
      color: var(--accent-blue);
      margin-bottom: 0;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      padding: 0.3rem 0;
    }

    .nav-links a:hover {
      color: var(--accent-blue);
    }

    .nav-links a.active {
      color: var(--accent-blue);
      border-bottom: 2px solid var(--accent-blue);
    }

    /* Theme toggle button */
    .theme-toggle {
      background-color: var(--bg-accent);
      color: var(--text-primary);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px var(--card-shadow);
      margin-left: 1rem;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle i {
      font-size: 1.2rem;
    }

    /* Language toggle button */
    .language-toggle {
      background-color: var(--bg-accent);
      color: var(--text-primary);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px var(--card-shadow);
    }

    .language-toggle:hover {
      transform: scale(1.1);
    }

    .language-toggle i {
      font-size: 1.2rem;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
    }

    /* Main content styles */
    main {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .section {
      background-color: var(--bg-secondary);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 6px var(--card-shadow);
    }

    .section-title {
      font-size: 1.8rem;
      color: var(--accent-blue);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--accent-blue);
      padding-bottom: 0.5rem;
    }

    /* Profile section */
    .profile-content {
      font-size: 1rem;
      line-height: 1.6;
    }

    /* Experience section */
    .timeline-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }

    .timeline-item {
      background-color: var(--bg-primary);
      border-radius: 8px;
      padding: 1.2rem;
      position: relative;
      box-shadow: 0 2px 4px var(--card-shadow);
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }

    .job-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 0.3rem;
    }

    .job-company {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .timespan {
      font-size: 0.9rem;
      color: var(--accent-light);
      white-space: nowrap;
      margin-left: 0.8rem;
    }

    .timeline-details ul {
      list-style-type: none;
      margin-top: 0.5rem;
    }

    .timeline-details li {
      position: relative;
      margin-bottom: 0.4rem;
      padding-left: 1.2rem;
      font-size: 0.95rem;
    }

    .timeline-details li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-blue);
    }

    /* Education section */
    .education-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    .education-item {
      background-color: var(--bg-primary);
      border-radius: 8px;
      padding: 1.2rem;
      position: relative;
      box-shadow: 0 2px 4px var(--card-shadow);
    }

    .degree-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-purple);
      margin-bottom: 0.3rem;
    }

    .school {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }

    .date {
      font-size: 0.85rem;
      color: var(--accent-light);
      margin-bottom: 0.8rem;
    }

    .education-list {
      list-style-type: none;
      padding-left: 0.5rem;
    }

    .education-list li {
      position: relative;
      margin-bottom: 0.4rem;
      padding-left: 1rem;
      font-size: 0.9rem;
    }

    .education-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent-purple);
    }

    /* Skills section */
    .skills-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.2rem;
    }

    .skills-column {
      background-color: var(--bg-primary);
      padding: 1.2rem;
      border-radius: 8px;
      box-shadow: 0 2px 4px var(--card-shadow);
    }

    .skills-title {
      font-size: 1.1rem;
      color: var(--accent-teal);
      margin-bottom: 0.8rem;
      border-bottom: 1px solid var(--accent-teal);
      padding-bottom: 0.4rem;
    }

    .skills-list {
      list-style-type: none;
      columns: auto 140px;
      column-gap: 1.5rem;
    }

    .skills-list li {
      position: relative;
      margin-bottom: 0.4rem;
      padding-left: 1.2rem;
      break-inside: avoid;
      font-size: 0.9rem;
    }

    .skills-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-teal);
    }

    /* Top sections container for side-by-side layout */
    .top-sections-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Contact card styles */
    .contact-card {
      background-color: var(--bg-primary);
      border-radius: 6px;
      padding: 1.2rem;
      box-shadow: 0 2px 4px var(--card-shadow);
    }

    /* Contact info */
    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 1rem;
      margin: 0.8rem 0;
      font-size: 0.9rem;
    }

    .contact-info p {
      display: flex;
      align-items: center;
      color: var(--text-secondary);
    }

    .contact-info i {
      margin-right: 0.5rem;
      color: var(--accent-blue);
    }

    /* Social links */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 0.8rem 0;
    }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .social-links a:hover {
      transform: translateY(-2px);
      background-color: var(--accent-blue);
      color: white;
      box-shadow: 0 2px 5px var(--card-shadow);
    }

    .social-links i {
      font-size: 1.2rem;
    }

    /* Hide French content by default */
    .fr {
      display: none !important;
    }

    /* When French language is active */
    .french-active .en {
      display: none !important;
    }

    .french-active .fr {
      display: block !important;
    }

    /* For elements that need to preserve their display property */
    .french-active .fr.flex {
      display: flex !important;
    }

    .french-active .fr.grid {
      display: grid !important;
    }

    .french-active .fr.inline {
      display: inline !important;
    }

    .french-active .fr.inline-block {
      display: inline-block !important;
    }

    /* Loading indicator */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background-color: var(--bg-primary);
      z-index: 100;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--bg-secondary);
      border-top: 5px solid var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .nav-container {
        flex-direction: column;
        gap: 0.8rem;
      }

      .header-content {
        flex-direction: column;
        text-align: center;
        width: 100%;
      }

      .nav-links {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.8rem;
        font-size: 0.9rem;
      }

      .nav-buttons {
        margin-top: 0.5rem;
      }

      .top-sections-container {
        grid-template-columns: 1fr;
      }

      .section {
        padding: 1.2rem;
      }

      .timeline-container,
      .education-container,
      .skills-container {
        grid-template-columns: 1fr;
      }

      .skills-list {
        columns: 2;
      }
    }

    @media (max-width: 480px) {
      .nav-links {
        font-size: 0.8rem;
        gap: 0.5rem;
      }

      .nav-links a {
        padding: 0.3rem 0.5rem;
      }

      .header-left h1 {
        font-size: 1.8rem;
      }

      .header-left p {
        font-size: 0.9rem;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .timeline-header {
        flex-direction: column;
      }

      .timespan {
        margin-left: 0;
        margin-top: 0.3rem;
      }

      .skills-list {
        columns: 1;
      }

      .contact-info {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- Loading indicator -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <!-- Navigation and Header -->
  <nav>
    <div class="nav-container">
      <div class="header-content">
        <div class="header-left">
          <h1>Mitchell Carroll</h1>
          <p class="en">Full-stack Web Developer | Systems Engineer</p>
          <p class="fr">Développeur Web Full-stack | Ingénieur Systèmes</p>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html" class="en">Home</a>
        <a href="index.html" class="fr">Accueil</a>
        <a href="resume.html" class="en active">Resume</a>
        <a href="resume.html" class="fr active">CV</a>
        <a href="epic_earth.html" class="en">EPIC Earth</a>
        <a href="epic_earth.html" class="fr">Terre EPIC</a>
        <a href="mars_weather.html" class="en">Mars Weather</a>
        <a href="mars_weather.html" class="fr">Météo Mars</a>
      </div>
      <div class="nav-buttons">
        <!-- Language toggle button -->
        <button class="language-toggle" id="languageToggle">
          <i class="fas fa-language"></i>
        </button>
        <!-- Theme toggle button -->
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <main id="main-content">
    <!-- Main content will be loaded from JSON -->
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      // Theme toggle functionality
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = themeToggle.querySelector('i');

      // Check if user has a saved preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      }

      themeToggle.addEventListener('click', function () {
        document.body.classList.toggle('dark-theme');

        // Update icon
        if (document.body.classList.contains('dark-theme')) {
          themeIcon.classList.remove('fa-moon');
          themeIcon.classList.add('fa-sun');
          localStorage.setItem('theme', 'dark');
        } else {
          themeIcon.classList.remove('fa-sun');
          themeIcon.classList.add('fa-moon');
          localStorage.setItem('theme', 'light');
        }
      });

      // Language toggle functionality
      const languageToggle = document.getElementById('languageToggle');

      // Check if user has a saved language preference
      const savedLanguage = localStorage.getItem('language');
      if (savedLanguage === 'fr') {
        document.body.classList.add('french-active');
      }

      languageToggle.addEventListener('click', function () {
        document.body.classList.toggle('french-active');

        // Save preference
        if (document.body.classList.contains('french-active')) {
          localStorage.setItem('language', 'fr');
        } else {
          localStorage.setItem('language', 'en');
        }
      });

      // Load the JSON data
      try {
        const response = await fetch('resume-data.json');
        const data = await response.json();

        // Render main content
        const mainContent = document.getElementById('main-content');

        // Profile and Contact Info Section (side by side)
        mainContent.innerHTML = `
          <div class="top-sections-container">
            <section class="section" id="profile">
              <h2 class="section-title en">${data.sections.profile.title.en}</h2>
              <h2 class="section-title fr">${data.sections.profile.title.fr}</h2>
              <div class="profile-content">
                <p class="en">${data.sections.profile.content.en}</p>
                <p class="fr">${data.sections.profile.content.fr}</p>
              </div>
            </section>
            
            <section class="section" id="contact">
              <h2 class="section-title en">Contact Information</h2>
              <h2 class="section-title fr">Coordonnées</h2>
              
              <div class="contact-card">
                <!-- Contact info -->
                <div class="contact-info">
                  <p><i class="fas fa-envelope"></i> mitchell.carroll24@gmail.com</p>
                  <p><i class="fas fa-map-marker-alt"></i> Ottawa, ON</p>
                  <p class="en"><i class="fas fa-shield-alt"></i> Secret Security Clearance</p>
                  <p class="fr"><i class="fas fa-shield-alt"></i> Cote de sécurité Secrète</p>
                  <p class="en"><i class="fas fa-language"></i> Bilingual (English, French)</p>
                  <p class="fr"><i class="fas fa-language"></i> Bilingue (Anglais, Français)</p>
                </div>
                
                <!-- Social links -->
                <div class="social-links">
                  <a href="https://github.com/mitchyc24" target="_blank"><i class="fab fa-github"></i></a>
                  <a href="https://linkedin.com/in/mitchell-carroll" target="_blank"><i class="fab fa-linkedin"></i></a>
                </div>
              </div>
            </section>
          </div>
        `;

        // Experience Section
        mainContent.innerHTML += `
          <section class="section" id="experience">
            <h2 class="section-title en">${data.sections.experience.title.en}</h2>
            <h2 class="section-title fr">${data.sections.experience.title.fr}</h2>
            <div class="timeline-container">
              ${data.sections.experience.jobs.map(job => `
                <div class="timeline-item">
                  <div class="timeline-content">
                    <div class="timeline-header">
                      <div>
                        <div class="job-title en">${job.title.en}</div>
                        <div class="job-title fr">${job.title.fr}</div>
                        <div class="job-company en">${job.company.en || job.company}</div>
                        <div class="job-company fr">${job.company.fr || job.company}</div>
                      </div>
                      <div class="timespan">${job.period}</div>
                    </div>
                    <div class="timeline-details">
                      <ul class="en">
                        ${job.responsibilities.en.map(resp => `<li>${resp}</li>`).join('')}
                      </ul>
                      <ul class="fr">
                        ${job.responsibilities.fr.map(resp => `<li>${resp}</li>`).join('')}
                      </ul>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>
        `;

        // Education Section
        mainContent.innerHTML += `
          <section class="section" id="education">
            <h2 class="section-title en">${data.sections.education.title.en}</h2>
            <h2 class="section-title fr">${data.sections.education.title.fr}</h2>
            <div class="education-container">
              ${data.sections.education.degrees.map(degree => `
                <div class="education-item">
                  <div class="degree-title en">${degree.title.en}</div>
                  <div class="degree-title fr">${degree.title.fr}</div>
                  <div class="school en">${degree.school.en}</div>
                  <div class="school fr">${degree.school.fr}</div>
                  <div class="date en">${degree.date.en}</div>
                  <div class="date fr">${degree.date.fr}</div>
                  <ul class="education-list en">
                    ${degree.details.en.map(detail => `<li>${detail}</li>`).join('')}
                  </ul>
                  <ul class="education-list fr">
                    ${degree.details.fr.map(detail => `<li>${detail}</li>`).join('')}
                  </ul>
                </div>
              `).join('')}
            </div>
          </section>
        `;

        // Skills Section
        mainContent.innerHTML += `
          <section class="section" id="skills">
            <h2 class="section-title en">${data.sections.skills.title.en}</h2>
            <h2 class="section-title fr">${data.sections.skills.title.fr}</h2>
            <div class="skills-container">
              ${data.sections.skills.categories.map(category => {
          // Handle both string arrays and object with en/fr arrays
          const hasTranslations = category.items && typeof category.items === 'object' && category.items.en;

          return `
                  <div class="skills-column">
                    <h3 class="skills-title en">${category.title.en}</h3>
                    <h3 class="skills-title fr">${category.title.fr}</h3>
                    ${hasTranslations ? `
                      <ul class="skills-list en">
                        ${category.items.en.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                      <ul class="skills-list fr">
                        ${category.items.fr.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                    ` : `
                      <ul class="skills-list">
                        ${category.items.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                    `}
                  </div>
                `;
        }).join('')}
            </div>
          </section>
        `;

        // Hide loading indicator
        document.getElementById('loading').style.display = 'none';

      } catch (error) {
        console.error('Error loading resume data:', error);
        document.getElementById('loading').innerHTML = '<p>Error loading resume data. Please try again later.</p>';
      }
    });
  </script>
</body>

</html>
