<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitchell Carroll - Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --space-dark: #0a0e17;
      --space-medium: #1a2333;
      --space-light: #2c3e50;
      --text-primary: #e0e6ed;
      --text-secondary: #a3b1c6;
      --accent-blue: #4a9ff5;
      --accent-purple: #9b59b6;
      --accent-teal: #1abc9c;
      --accent-orange: #e67e22;
      --card-shadow: rgba(0, 0, 0, 0.5);
      --star-color: rgba(255, 255, 255, 0.8);
    }

    /* Light theme variables */
    .light-theme {
      --space-dark: #f5f7fa;
      --space-medium: #e4e9f0;
      --space-light: #d0d7e1;
      --text-primary: #2c3e50;
      --text-secondary: #546778;
      --card-shadow: rgba(0, 0, 0, 0.1);
      --star-color: rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--space-dark);
      background-image:
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 100px 100px;
      color: var(--text-primary);
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }

    /* Stars background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background-color: var(--star-color);
      border-radius: 50%;
      animation: twinkle 4s infinite ease-in-out;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* Navigation and Header */
    nav {
      background-color: var(--space-medium);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border-bottom: 2px solid var(--accent-blue);
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .header-content {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .header-left h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .header-left p {
      font-size: 1.2rem;
      color: var(--accent-blue);
      margin-bottom: 0;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--accent-blue);
    }

    .nav-links a.active {
      color: var(--accent-blue);
      border-bottom: 2px solid var(--accent-blue);
    }

    /* Theme toggle button */
    .theme-toggle {
      background-color: var(--space-light);
      color: var(--text-primary);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      box-shadow: 0 2px 5px var(--card-shadow);
      margin-left: 1rem;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle i {
      font-size: 1.2rem;
    }

    /* Language toggle button */
    .language-toggle {
      background-color: var(--space-light);
      color: var(--text-primary);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      box-shadow: 0 2px 5px var(--card-shadow);
    }

    .language-toggle:hover {
      transform: scale(1.1);
    }

    .language-toggle i {
      font-size: 1.2rem;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
    }

    /* Responsive design for navbar */
    @media (max-width: 768px) {
      .nav-container {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
      }

      .header-content {
        flex-direction: column;
        text-align: center;
        width: 100%;
      }

      .nav-links {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.8rem;
        font-size: 0.9rem;
      }

      .nav-buttons {
        margin-top: 0.5rem;
      }

      .resume-header {
        padding: 2rem 1rem;
      }

      .resume-title {
        font-size: 2rem;
      }

      .resume-subtitle {
        font-size: 1.2rem;
      }

      .experience-container,
      .education-container,
      .skills-container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .nav-links {
        font-size: 0.8rem;
        gap: 0.5rem;
      }

      .nav-links a {
        padding: 0.3rem 0.5rem;
      }
    }

    /* Main content styles */
    main {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .section {
      background-color: var(--space-medium);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px var(--card-shadow);
      position: relative;
      overflow: hidden;
    }

    .section-title {
      font-size: 2rem;
      color: var(--accent-blue);
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--accent-blue);
      padding-bottom: 0.5rem;
    }

    /* Profile section */
    .profile-content {
      font-size: 1.1rem;
      line-height: 1.8;
    }

    /* Experience section */
    .timeline-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .timeline-item {
      background-color: var(--space-light);
      border-radius: 8px;
      padding: 1.5rem;
      position: relative;
      box-shadow: 0 4px 8px var(--card-shadow);
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent-blue), var(--accent-teal));
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .job-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent-blue);
      margin-bottom: 0.5rem;
    }

    .job-company {
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .timespan {
      font-size: 0.9rem;
      color: var(--accent-orange);
      white-space: nowrap;
      margin-left: 1rem;
    }

    .timeline-details ul {
      list-style-type: none;
    }

    .timeline-details li {
      position: relative;
      margin-bottom: 0.5rem;
      padding-left: 1.5rem;
    }

    .timeline-details li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-blue);
    }

    /* Education section */
    .education-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .education-item {
      background-color: var(--space-light);
      border-radius: 8px;
      padding: 1.5rem;
      position: relative;
      box-shadow: 0 4px 8px var(--card-shadow);
    }

    .education-item::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent-purple), var(--accent-teal));
    }

    .degree-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent-purple);
      margin-bottom: 0.5rem;
    }

    .school {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .date {
      font-size: 0.9rem;
      color: var(--accent-orange);
      margin-bottom: 1rem;
    }

    .education-list {
      list-style-type: none;
      padding-left: 1rem;
    }

    .education-list li {
      position: relative;
      margin-bottom: 0.5rem;
      padding-left: 1rem;
    }

    .education-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent-purple);
    }

    /* Skills section */
    .skills-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .skills-column {
      background-color: var(--space-light);
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--card-shadow);
    }

    .skills-title {
      font-size: 1.3rem;
      color: var(--accent-teal);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--accent-teal);
      padding-bottom: 0.5rem;
    }

    .skills-list {
      list-style-type: none;
      columns: auto 150px;
      column-gap: 2rem;
    }

    .skills-list li {
      position: relative;
      margin-bottom: 0.5rem;
      padding-left: 1.5rem;
      break-inside: avoid;
    }

    .skills-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-teal);
    }

    @media (max-width: 768px) {

      .timeline-container,
      .education-container,
      .skills-container {
        grid-template-columns: 1fr;
      }

      .skills-list {
        columns: auto 120px;
      }
    }

    /* Orbit animation for decorative elements */
    .orbit {
      position: absolute;
      border: 1px solid rgba(74, 159, 245, 0.2);
      border-radius: 50%;
      animation: rotate 20s linear infinite;
    }

    .orbit-1 {
      width: 300px;
      height: 300px;
      top: -150px;
      right: -150px;
    }

    .orbit-2 {
      width: 200px;
      height: 200px;
      bottom: -100px;
      left: -100px;
      animation-duration: 15s;
      animation-direction: reverse;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .planet {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent-blue), var(--accent-purple));
    }

    .planet-1 {
      width: 20px;
      height: 20px;
      top: 0;
      left: 50%;
    }

    .planet-2 {
      width: 15px;
      height: 15px;
      top: 50%;
      left: 0;
      background: radial-gradient(circle at 30% 30%, var(--accent-teal), var(--accent-blue));
    }

    /* Hide French content by default */
    .fr {
      display: none !important;
    }

    /* When French language is active */
    .french-active .en {
      display: none !important;
    }

    .french-active .fr {
      display: block !important;
    }

    /* For elements that need to preserve their display property */
    .french-active .fr.flex {
      display: flex !important;
    }

    .french-active .fr.grid {
      display: grid !important;
    }

    .french-active .fr.inline {
      display: inline !important;
    }

    .french-active .fr.inline-block {
      display: inline-block !important;
    }

    /* Loading indicator */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background-color: var(--space-dark);
      z-index: 100;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--space-medium);
      border-top: 5px solid var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Loading indicator -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <!-- Navigation and Header -->
  <nav>
    <div class="nav-container">
      <div class="header-content">
        <div class="header-left">
          <h1>Mitchell Carroll</h1>
          <p class="en">Full-stack Web Developer | Systems Engineer</p>
          <p class="fr">Développeur Web Full-stack | Ingénieur Systèmes</p>
        </div>
      </div>
      <div class="nav-links">
        <a href="index.html" class="en">Home</a>
        <a href="index.html" class="fr">Accueil</a>
        <a href="resume.html" class="en active">Resume</a>
        <a href="resume.html" class="fr active">CV</a>
        <a href="epic_earth.html" class="en">EPIC Earth</a>
        <a href="epic_earth.html" class="fr">Terre EPIC</a>
        <a href="mars_weather.html" class="en">Mars Weather</a>
        <a href="mars_weather.html" class="fr">Météo Mars</a>
      </div>
      <div class="nav-buttons">
        <!-- Language toggle button -->
        <button class="language-toggle" id="languageToggle">
          <i class="fas fa-language"></i>
        </button>
        <!-- Theme toggle button -->
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <main id="main-content">
    <!-- Main content will be loaded from JSON -->
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      // Create stars in the background
      const starsContainer = document.getElementById('stars');
      const starsCount = 200;

      for (let i = 0; i < starsCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';

        // Random position
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        star.style.left = `${x}%`;
        star.style.top = `${y}%`;

        // Random size
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;

        // Random twinkle delay
        star.style.animationDelay = `${Math.random() * 4}s`;

        starsContainer.appendChild(star);
      }

      // Parallax effect for stars
      document.addEventListener('mousemove', function (e) {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;

        starsContainer.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
      });

      // Theme toggle functionality
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = themeToggle.querySelector('i');

      // Check if user has a saved preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
      }

      themeToggle.addEventListener('click', function () {
        document.body.classList.toggle('light-theme');

        // Update icon
        if (document.body.classList.contains('light-theme')) {
          themeIcon.classList.remove('fa-moon');
          themeIcon.classList.add('fa-sun');
          localStorage.setItem('theme', 'light');
        } else {
          themeIcon.classList.remove('fa-sun');
          themeIcon.classList.add('fa-moon');
          localStorage.setItem('theme', 'dark');
        }
      });

      // Language toggle functionality
      const languageToggle = document.getElementById('languageToggle');

      // Check if user has a saved language preference
      const savedLanguage = localStorage.getItem('language');
      if (savedLanguage === 'fr') {
        document.body.classList.add('french-active');
      }

      languageToggle.addEventListener('click', function () {
        document.body.classList.toggle('french-active');

        // Save preference
        if (document.body.classList.contains('french-active')) {
          localStorage.setItem('language', 'fr');
        } else {
          localStorage.setItem('language', 'en');
        }
      });

      // Load the JSON data
      try {
        const response = await fetch('resume-data.json');
        const data = await response.json();

        // Render main content
        const mainContent = document.getElementById('main-content');

        // Profile Section
        mainContent.innerHTML = `
          <section class="section" id="profile">
            <h2 class="section-title en">${data.sections.profile.title.en}</h2>
            <h2 class="section-title fr">${data.sections.profile.title.fr}</h2>
            <div class="profile-content">
              <p class="en">${data.sections.profile.content.en}</p>
              <p class="fr">${data.sections.profile.content.fr}</p>
            </div>
          </section>
        `;

        // Experience Section
        mainContent.innerHTML += `
          <section class="section" id="experience">
            <h2 class="section-title en">${data.sections.experience.title.en}</h2>
            <h2 class="section-title fr">${data.sections.experience.title.fr}</h2>
            <div class="timeline-container">
              ${data.sections.experience.jobs.map(job => `
                <div class="timeline-item">
                  <div class="timeline-content">
                    <div class="timeline-header">
                      <div>
                        <div class="job-title en">${job.title.en}</div>
                        <div class="job-title fr">${job.title.fr}</div>
                        <div class="job-company en">${job.company.en || job.company}</div>
                        <div class="job-company fr">${job.company.fr || job.company}</div>
                      </div>
                      <div class="timespan">${job.period}</div>
                    </div>
                    <div class="timeline-details">
                      <ul class="en">
                        ${job.responsibilities.en.map(resp => `<li>${resp}</li>`).join('')}
                      </ul>
                      <ul class="fr">
                        ${job.responsibilities.fr.map(resp => `<li>${resp}</li>`).join('')}
                      </ul>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>
        `;

        // Education Section
        mainContent.innerHTML += `
          <section class="section" id="education">
            <h2 class="section-title en">${data.sections.education.title.en}</h2>
            <h2 class="section-title fr">${data.sections.education.title.fr}</h2>
            <div class="education-container">
              ${data.sections.education.degrees.map(degree => `
                <div class="education-item">
                  <div class="degree-title en">${degree.title.en}</div>
                  <div class="degree-title fr">${degree.title.fr}</div>
                  <div class="school en">${degree.school.en}</div>
                  <div class="school fr">${degree.school.fr}</div>
                  <div class="date en">${degree.date.en}</div>
                  <div class="date fr">${degree.date.fr}</div>
                  <ul class="education-list en">
                    ${degree.details.en.map(detail => `<li>${detail}</li>`).join('')}
                  </ul>
                  <ul class="education-list fr">
                    ${degree.details.fr.map(detail => `<li>${detail}</li>`).join('')}
                  </ul>
                </div>
              `).join('')}
            </div>
          </section>
        `;

        // Skills Section
        mainContent.innerHTML += `
          <section class="section" id="skills">
            <h2 class="section-title en">${data.sections.skills.title.en}</h2>
            <h2 class="section-title fr">${data.sections.skills.title.fr}</h2>
            <div class="skills-container">
              ${data.sections.skills.categories.map(category => {
          // Handle both string arrays and object with en/fr arrays
          const hasTranslations = category.items && typeof category.items === 'object' && category.items.en;

          return `
                  <div class="skills-column">
                    <h3 class="skills-title en">${category.title.en}</h3>
                    <h3 class="skills-title fr">${category.title.fr}</h3>
                    ${hasTranslations ? `
                      <ul class="skills-list en">
                        ${category.items.en.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                      <ul class="skills-list fr">
                        ${category.items.fr.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                    ` : `
                      <ul class="skills-list">
                        ${category.items.map(skill => `<li>${skill}</li>`).join('')}
                      </ul>
                    `}
                  </div>
                `;
        }).join('')}
            </div>
          </section>
        `;

        // Hide loading indicator
        document.getElementById('loading').style.display = 'none';

      } catch (error) {
        console.error('Error loading resume data:', error);
        document.getElementById('loading').innerHTML = '<p>Error loading resume data. Please try again later.</p>';
      }
    });
  </script>
</body>

</html>
